# Google Sheets — new dedicated tracking sheet
sheets:
  spreadsheet_id: "1cQH7gwBvAmZO8WiYNPbrCSnO8zxB0DUDhzaeMM5o-ZU"
  exceptions_tab: "Exceptions"
  shipments_tab: "Shipments"
  tracked_actions_tab: "Tracked Actions"

slack:
  webhook_url: "${SLACK_WEBHOOK_URL}"
  channel: "#parcel-claude"

schedule:
  alert_window:
    start: "06:00"
    end: "18:00"
    timezone: "America/New_York"

# Outreach thresholds — only needs_replan for Phase 1
outreach:
  needs_replan:
    yellow: 15
    red: 35
    message_template: |
      Hi {site_code} team,
      We're seeing {count} parcels in Needs Replan status as of {time}.
      Please trigger a replan to move these parcels into batches for dispatch.
      Let us know if you need support.
      — Live Ops
  cooldown_minutes: 120

